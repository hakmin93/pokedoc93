<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>1996 아트웍 100종</title>
  <link rel="stylesheet" href="../header.css">

  <style>
    body {
      background: black;
      color: white;
      margin: 0;
      padding-top: 40px;
    }

    .page-title {
      text-align: center;
      font-size: 24px;
      margin: 20px 0;
      color: white;
    }

    .checkCnt {
      color: white;
      margin: 10px;
      font-size: 16px;
    }

    #imageDiv {
      padding: 10px;
      font-size: 0;
    }

    .image {
      position: relative;
      display: inline-block;
      width: 84px;
      height: 111px;
      margin: 1px;
      cursor: pointer;
      background-repeat: no-repeat;
      box-sizing: border-box;
      overflow: hidden;
      vertical-align: top;
    }

    .image > div {
      width: 100%;
      height: 100%;
      position: absolute;
      left: 0;
      top: 0;
      border: 1px solid black;
      box-sizing: border-box;
    }

    .selected {
      background-color: rgba(0,0,0,0.7);
    }

    .btnDiv {
      margin: 20px 10px;
    }

    .btnDiv input {
      margin-right: 10px;
      padding: 6px 10px;
      cursor: pointer;
    }
  </style>
</head>

<body id="body">
  <header class="PMS_Header_UI">
    <div class="Header__Users">☰</div>
    <div class="Header__Btns UI">
      <a class="titleBtn">학민's 포켓몬 도감</a>
      <a class="navBtn" href="../index.html">메인</a>
      <a class="navBtn" href="../order_release_fix/">출시순</a>
      <a class="navBtn" href="../1996artwork100/">1996 아트웍 100종</a>
    </div>
  </header>

  <div class="page-title">1996 아트웍 100종</div>

  <div class="checkCnt">
    선택: <span id="cnt">0</span>/100
  </div>

  <div id="imageDiv"></div>

  <div class="btnDiv">
    <input type="button" id="reverseBtn" value="선택반전">
    <input type="button" id="showBtn" value="숨긴 씰 보기">
  </div>

  <script>
    function createSpriteCards() {
      const container = document.getElementById("imageDiv");

      // 큰 원본 이미지 1장
      const imageUrl = "../image/1996artwork100/1996artwork100.jpg";

      // 10 x 10 = 100칸
      const totalCount = 100;
      const cols = 10;
      const rows = 10;

      // 원본 스타일 기본 카드 크기
      const cardWidth = 92;
      const cardHeight = 126;

      // 원본 큰 이미지가 "정확히 10x10 표"라고 가정
      // 여백이 없으면 보통 이 값으로 시작
      const startX = 52;
      const startY = 84;

      // 다음 칸으로 이동하는 간격
      const stepX = 102;
      const stepY = 136;

      // 전체 배경 크기 = 칸크기 × 열/행
      const bgWidth = 1125;
      const bgHeight = 1481;

      for (let i = 0; i < totalCount; i++) {
        const col = i % cols;
        const row = Math.floor(i / cols);

        const card = document.createElement("div");
        card.className = "image";

        card.style.width = cardWidth + "px";
        card.style.height = cardHeight + "px";
        card.style.backgroundImage = `url("${imageUrl}")`;
        card.style.backgroundSize = `${bgWidth}px ${bgHeight}px`;
        card.style.backgroundPosition =
          `-${startX + col * stepX}px -${startY + row * stepY}px`;

        const overlay = document.createElement("div");
        card.appendChild(overlay);

        container.appendChild(card);
      }
    }

    function setupSelect() {
      const overlays = document.querySelectorAll(".image > div");
      const cnt = document.getElementById("cnt");

      function updateCount() {
        cnt.innerText = document.querySelectorAll(".image > div.selected").length;
      }

      overlays.forEach(function(overlay) {
        overlay.addEventListener("click", function() {
          overlay.classList.toggle("selected");
          updateCount();
        });
      });

      document.getElementById("reverseBtn").addEventListener("click", function() {
        overlays.forEach(function(overlay) {
          overlay.classList.toggle("selected");
        });
        updateCount();
      });

      document.getElementById("showBtn").addEventListener("click", function() {
        document.querySelectorAll(".image").forEach(function(card) {
          card.style.display = "";
        });
      });

      updateCount();
    }

    createSpriteCards();
    setupSelect();
  </script>
</body>
</html>
